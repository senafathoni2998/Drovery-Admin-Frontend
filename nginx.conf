# In-container nginx: serve the built SPA. TLS + /api + /ws proxying happen at the edge
# (Caddy in the production compose), so this just serves static files with SPA-history fallback.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the content-hashed build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA history fallback — every other path serves index.html (react-router handles routing).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
