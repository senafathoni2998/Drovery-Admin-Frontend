name: Publish image

# CI/CD: build the admin SPA image and push to Docker Hub (senaahmad2998/drovery-admin).
# Fires on every push to main (→ :latest + :sha-<short>) and on a version tag
# (→ :vX.Y.Z + :latest), or on demand.
#
# Setup: add ONE repo secret — DOCKERHUB_TOKEN (Docker Hub access token, Read/Write). The
# username is public, so it's hard-coded below. Build uses the default relative API base
# (/api/v1) so the image works behind the Caddy edge on any domain with no rebuild.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: senaahmad2998
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: senaahmad2998/drovery-admin
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
